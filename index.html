<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/pages/index.css">
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
        <title>Сканирование</title>
    </head>
    <body>
        <div class="container">
            <h1>Поиск устройств в локальной сети</h1>

            <div class="scan-controls">
                <button id="scan-button">Начать сканирование</button>
                <button id="clear-btn">Очистить</button>
            </div>

            <div id="scan-status" class="scan-status">
                Нажмите «Начать сканирование» для поиска устройств
            </div>
            <div class="loading">Идёт сканирование сети...</div>

            <ul id="device-list" class="device-list">
                <!-- Сюда будут добавляться найденные устройства -->
            </ul>
        </div>
        <script src="js/discover.js"></script>
    </body>
</html>
