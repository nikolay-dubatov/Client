<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/pages/control.css">
        <link rel="favicon" href="favicon.ico" type="image/x-icon">
        <title>Управление устройством</title>
    </head>
    <body class="control-page">
        <div class="control-container">
            <header class="control-header">
                <div class="header-top">
                    <h2>Управление устройством</h2>
                    <button onclick="disconnect()" id="disconnect-btn" class="btn btn-danger">Отключиться</button>
                    <button class="btn" id="toggleTelemetryBtn">Запустить телеметрию</button>
                </div>
                <div class="header-bottom">
                    <div class="lights-control">
                        <button title="headlights" class="light-btn off" data-state="off" data-name="headlights">
                            💡
                        </button>
                        <button title="hazard lights" class="light-btn off" data-state="off" data-name="hazard_lights">
                            ⚠️
                        </button>
                        <button title="parking lights" class="light-btn off" data-state="off" data-name="parking_lights">
                            🔵
                        </button>
                    </div>
                    <div class="status-label" id="status-label">Готов к работе</div>
                </div>
            </header>

            <main class="control-main">
                <section class="horn-section">
                    <h3>Гудок</h3>
                    <button id="horn-btn" class="btn horn-btn">Подать сигнал</button>
                </section>

                <!-- Основная область управления: три колонки -->
                <div class="control-grid">
                    <!-- Левая колонка: движение вперёд/назад -->
                    <div class="control-column car-forward-column">
                        <section class="control-section car-forward-section">
                            <h3>Движение</h3>
                            <div class="direction-buttons-vertical">
                                <button class="btn car-btn forward" data-direction="forward">
                                    ↑
                                </button>
                                <button class="btn car-btn backward" data-direction="backward">
                                    ↓
                                </button>
                            </div>
                        </section>
                    </div>

                    <!-- Центральная колонка: управление камерой -->
                    <div class="control-column camera-column">
                        <section class="control-section camera-section">
                            <h3>📹 Видеопоток и управление камерой</h3>

                            <!-- Блок видео -->
                            <div class="video-container">
                                <img id="video-feed">
                                <div class="telemetry-grid">
                                    <div class="telemetry-item">
                                        <label>Батарея:</label>
                                        <span class="battery value" id="battery-value">—</span>
                                    </div>
                                    <div class="telemetry-item">
                                        <label>Препятствие:</label>
                                        <span class="obstacle value" id="obstacle-value">— см</span>
                                    </div>
                                    <div class="telemetry-item">
                                        <label>Время обновления:</label>
                                        <span id="timestamp-value">—</span>
                                    </div>
                                </div>
                            </div>
                            <div class="camera-controls">
                                <div class="camera-buttons">
                                    <button class="btn cam-btn up" data-direction="cam-up">↑</button>
                                    <button class="btn cam-btn left" data-direction="cam-left">←</button>
                                    <button class="btn cam-btn right" data-direction="cam-right">→</button>
                                    <button class="btn cam-btn down" data-direction="cam-down">↓</button>
                                </div>
                        
                                <div class="joystick-container">
                                    <div class="joystick" id="joystick-camera">
                                        <div class="joystick-knob"></div>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>

                    <!-- Правая колонка: повороты влево/вправо -->
                    <div class="control-column car-turn-column">
                        <section class="control-section car-turn-section">
                            <h3>←→ Повороты</h3>
                            <div class="direction-buttons-horisontal">
                                <button class="btn car-btn left" data-direction="left">←</button>
                                <button class="btn car-btn right" data-direction="right">→</button>
                            </div>
                        </section>
                    </div>
                </div>
                <!-- Дополнительные функции -->
                <section class="control-section additional-section">
                    <h3>Настройки</h3>
                    <div class="additional-controls">
                        <button class="btn speed-btn selected" data-speed="low">Низкая скорость</button>
                        <button class="btn speed-btn" data-speed="medium">Средняя скорость</button>
                        <button class="btn speed-btn" data-speed="high">Высокая скорость</button>
                    </div>
                </section>
            </main>
        </div>
        
        <script src="js/main.js"></script>
    </body>
</html>
